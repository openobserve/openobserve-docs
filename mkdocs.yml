site_name: OpenObserve Documentation
site_url: https://openobserve.ai/docs
site_description: OpenObserve (O2) is a cloud-native observability platform that unifies logs, metrics, and traces into a single solution, built for petabyte scale with up to 140x lower storage cost than Elasticsearch.
# https://github.com/lukasgeiter/mkdocs-awesome-pages-plugin required for nav
hooks:
  - hooks/llm_markdown.py
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      timezone: UTC
      fallback_to_build_date: true
  - awesome-pages
  - material-plausible
  - redirects:
      redirect_maps:
        'administration/deployment/openobserve-enterprise-edition-installation-guide.md': 'enterprise-setup/index.md'
        'administration/deployment/capacity-planning.md': 'enterprise-setup/capacity-planning.md'
        'administration/deployment/performance.md': 'enterprise-setup/performance.md'
        'administration/deployment/sre-agent-setup-guide.md': 'enterprise-setup/sre-agent.md'
        'quickstart.md': 'getting-started.md'
        'downloads.md': 'getting-started.md'
  - llmstxt:
      sections:
        Getting started:
          - index.md
          - getting-started.md
          - architecture.md
        User guide:
          - user-guide/*.md
        Ingestion:
          - ingestion/*.md
        Integrations:
          - integration/*.md
        Features:
          - features/*.md
        Administration:
          - administration/*.md
        Reference:
          - reference/*.md
        Migration:
          - migration/**/*.md
        Releases:
          - releases.md
# nav:
