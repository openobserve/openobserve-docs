# Watch the theme overrides dir so `mkdocs serve` hot-reloads on edits to
# overrides/partials/*.html and overrides/css/*.css (not watched by default).
watch:
  - overrides
theme:
  favicon: images/logo_circle.png
  name: material
  custom_dir: overrides
  features:
    # - navigation.expand
    # - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.code.select
  palette:
    - scheme: default
      primary: white
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to light mode
# repo_url: https://github.com/openobserve/openobserve
# repo_name: openobserve/openobserve
# edit_uri: https://github.com/openobserve/openobserve-docs/edit/main/docs/
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - meta
